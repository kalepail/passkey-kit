name = "passkey-kit-relayer-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for storing one Relayer API key per client IP.
# Provision before the first deploy and paste the returned id below:
#   wrangler kv namespace create API_KEYS
# (This repo ships a placeholder id — replace it; NO deploys happen from the
# services todo.)
[[kv_namespaces]]
binding = "API_KEYS"
id = "REPLACE_WITH_TESTNET_KV_NAMESPACE_ID"
# For `wrangler dev` you can add a preview namespace:
#   wrangler kv namespace create API_KEYS --preview
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# Raise the CPU limit for testnet's Friendbot-funding retry loop (up to 5
# minutes). Network wait time (fetch) does not count toward CPU time. Mainnet
# never retries, so it uses the default limit.
[limits]
cpu_ms = 300_000

[vars]
NETWORK = "testnet"
RELAYER_BASE_URL = "https://channels.openzeppelin.com/testnet"

# ============================================================================
# Production environment (mainnet). Deploy: wrangler deploy --env production
# ============================================================================
[env.production]
name = "passkey-kit-relayer-proxy-mainnet"

[env.production.vars]
NETWORK = "mainnet"
RELAYER_BASE_URL = "https://channels.openzeppelin.com"

[[env.production.kv_namespaces]]
binding = "API_KEYS"
id = "REPLACE_WITH_MAINNET_KV_NAMESPACE_ID"
