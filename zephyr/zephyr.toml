name = "passkey-kit-indexer"

# Signer index: one row per (wallet address, signer key). `active` is a
# soft-delete flag (no row-delete host op exists). `exp` is a UNIX timestamp
# (seconds) or i64::MAX for "never".
[[tables]]
name = "signers"
force = false

[[tables.columns]]
name = "address"
col_type = "BYTEA"
index = true

[[tables.columns]]
name = "key"
col_type = "BYTEA"
index = true

[[tables.columns]]
name = "val"
col_type = "BYTEA"

[[tables.columns]]
name = "limits"
col_type = "BYTEA"

[[tables.columns]]
name = "exp"
col_type = "BIGINT"

[[tables.columns]]
name = "storage"
col_type = "BYTEA"

[[tables.columns]]
name = "active"
col_type = "BYTEA"

# Trusted wallets: allowlisted smart-wallet instances observed on-chain. Table
# membership is the ingestion trust gate (audit F3); `wasm_hash` records the
# latest known executable (refreshed from `upgraded` events).
[[tables]]
name = "wallets"
force = false

[[tables.columns]]
name = "address"
col_type = "BYTEA"
index = true

[[tables.columns]]
name = "wasm_hash"
col_type = "BYTEA"
